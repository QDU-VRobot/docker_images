name: Build CI Images

on:
  push:
    branches: [master]
    paths:
      - "images/*/Dockerfile"
      - ".github/workflows/build-images.yml"

  schedule:
    - cron: "0 6 1 * *"

  workflow_dispatch:
    inputs:
      image:
        description: "Optional: build only this image folder name, e.g. ros2-humble-ci"
        required: false
        default: ""
      tag:
        description: "Optional extra tag, e.g. 2026-02-17"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  discover:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: set-matrix
        shell: bash
        run: |
          set -euo pipefail

          EVENT_NAME="${{ github.event_name }}"

          # 手动触发：如果指定 image，只构建指定 image
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "${{ inputs.image }}" ]; then
            SEL="images/${{ inputs.image }}"

            # 兼容用户输入 images/xxx 或 xxx
            if [ -f "${{ inputs.image }}/Dockerfile" ]; then
              SEL="${{ inputs.image }}"
            fi

            if [ ! -f "$SEL/Dockerfile" ]; then
              echo "Input image folder not found: $SEL" >&2
              exit 1
            fi

            ALL=("$SEL")

          # 定时触发：构建全部 images/*/Dockerfile
          elif [ "$EVENT_NAME" = "schedule" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            mapfile -t ALL < <(
              find images -mindepth 2 -maxdepth 2 -type f -name Dockerfile -print \
                | sed 's|/Dockerfile$||' \
                | sort
            )

          # push 触发：只构建本次提交中被修改的 Dockerfile 对应 image
          elif [ "$EVENT_NAME" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"

            # 新分支或 before 为空时兜底
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              CHANGED="$(git diff-tree --no-commit-id --name-only -r "$AFTER" || true)"
            else
              CHANGED="$(git diff --name-only "$BEFORE" "$AFTER" || true)"
            fi

            mapfile -t ALL < <(
              echo "$CHANGED" \
                | grep -E '^images/[^/]+/Dockerfile$' \
                | sed 's|/Dockerfile$||' \
                | sort -u
            )

          else
            ALL=()
          fi

          if [ "${#ALL[@]}" -eq 0 ]; then
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          INC=""
          for d in "${ALL[@]}"; do
            name="${d#images/}"
            INC="${INC}{\"name\":\"$name\",\"context\":\"$d\",\"dockerfile\":\"$d/Dockerfile\"},"
          done

          INC="[${INC%,}]"
          echo "matrix={\"include\":$INC}" >> "$GITHUB_OUTPUT"

  build:
    needs: discover
    if: ${{ fromJson(needs.discover.outputs.matrix).include[0] != null }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH Agent for GitHub private repo access
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY_FOR_GITHUB }}

      - name: Add GitHub to SSH known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Set image repo lowercase
        id: img
        shell: bash
        run: |
          echo "repo=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.img.outputs.repo }}/${{ matrix.name }}:latest
            ${{ steps.img.outputs.repo }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          ssh: |
            default=${{ env.SSH_AUTH_SOCK }}
